<!doctype html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>あたしが隣にいるうちに — Player</title>
  <meta name="description" content="Listen to あたしが隣にいるうちに by Chiai Fujikawa.">
  <meta name="theme-color" content="#000000">
  <link rel="icon" href="https://i.imgur.com/z90F1JD.jpeg">
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    .player-page { display: grid; min-height: 100svh; place-items: center; padding: 32px 20px; }
    .player-shell { width: min(100%, 760px); }
    .player-back { display: inline-flex; margin-bottom: 24px; color: var(--muted); font-size: .88rem; font-weight: 700; }
    .player-back:hover { color: var(--text); }
    .audio-card { overflow: hidden; border: 1px solid var(--line); border-radius: var(--radius-lg); background: var(--surface); box-shadow: var(--shadow); }
    .audio-visual { position: relative; display: grid; min-height: 330px; place-items: center; padding: 44px; overflow: hidden; background: radial-gradient(circle at 50% 30%, rgb(167 139 250 / .23), transparent 52%), #050506; }
    .audio-visual::before, .audio-visual::after { position: absolute; border: 1px solid var(--line); border-radius: 50%; content: ""; }
    .audio-visual::before { width: 410px; height: 410px; }
    .audio-visual::after { width: 300px; height: 300px; border-color: rgb(103 232 249 / .18); }
    .album-art { position: relative; z-index: 1; width: min(52vw, 210px); aspect-ratio: 1; border: 1px solid var(--line-bright); border-radius: 24px; box-shadow: 0 24px 80px #000, 0 0 70px rgb(167 139 250 / .22); object-fit: cover; }
    .audio-info { padding: 30px; }
    .audio-label { margin-bottom: 9px; color: var(--violet-bright); font-size: .7rem; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; }
    .audio-info h1 { margin-bottom: 8px; font-size: clamp(1.65rem, 5vw, 2.7rem); letter-spacing: -.045em; }
    .artist { margin-bottom: 28px; color: var(--muted); }
    .timeline { display: grid; grid-template-columns: 42px 1fr 42px; align-items: center; gap: 12px; margin-bottom: 24px; color: var(--faint); font-size: .76rem; font-variant-numeric: tabular-nums; }
    input[type="range"] { width: 100%; accent-color: var(--violet); cursor: pointer; }
    .player-controls { display: flex; align-items: center; justify-content: space-between; gap: 18px; }
    .transport { display: flex; align-items: center; gap: 10px; }
    .control { display: grid; width: 44px; height: 44px; place-items: center; border: 1px solid var(--line-bright); border-radius: 50%; background: var(--surface-raised); color: var(--text); cursor: pointer; transition: transform 160ms ease, background 160ms ease; }
    .control:hover { background: var(--surface-hover); transform: scale(1.05); }
    .control.play { width: 54px; height: 54px; border-color: transparent; background: var(--text); color: #000; font-size: 1.1rem; }
    .volume { display: flex; max-width: 150px; align-items: center; gap: 10px; color: var(--muted); }
    .download-track { margin-top: 24px; }
    .player-note { margin: 18px 4px 0; color: var(--faint); font-size: .78rem; text-align: center; }
    @media (max-width: 520px) { .audio-info { padding: 22px; } .audio-visual { min-height: 280px; } .player-controls { align-items: flex-start; flex-direction: column; } .volume { width: 100%; max-width: none; } }
  </style>
</head>
<body>
  <main class="player-page">
    <div class="player-shell">
      <a class="player-back" href="/">← Back to dill.moe</a>
      <section class="audio-card" aria-label="Audio player">
        <div class="audio-visual"><img class="album-art" src="https://i.imgur.com/z90F1JD.jpeg" alt="Album artwork" width="600" height="600"></div>
        <div class="audio-info">
          <p class="audio-label">Now playing</p>
          <h1>あたしが隣にいるうちに</h1>
          <p class="artist">Chiai Fujikawa</p>
          <div class="timeline"><span id="current">0:00</span><input id="seek" type="range" min="0" max="1000" value="0" aria-label="Seek through track"><span id="duration">0:00</span></div>
          <div class="player-controls">
            <div class="transport">
              <button class="control" id="back" type="button" aria-label="Go back 10 seconds">−10</button>
              <button class="control play" id="play" type="button" aria-label="Play">▶</button>
              <button class="control" id="forward" type="button" aria-label="Go forward 10 seconds">+10</button>
            </div>
            <label class="volume" aria-label="Volume">◖ <input id="volume" type="range" min="0" max="1" step="0.01" value="1"></label>
          </div>
          <a class="button download-track" href="https://file.garden/Z5L9imBsKDyHFOQg/Shared/Atashi%20ga%20Tonari%20ni%20Iru%20Uchi%20ni.flac" download>Download FLAC <span class="arrow">↓</span></a>
        </div>
      </section>
      <p class="player-note">If playback does not start, your browser may not support FLAC. The download will still work.</p>
    </div>
    <audio id="audio" preload="metadata"><source src="https://file.garden/Z5L9imBsKDyHFOQg/Shared/Atashi%20ga%20Tonari%20ni%20Iru%20Uchi%20ni.flac" type="audio/flac"></audio>
  </main>
  <script>
    const audio = document.querySelector('#audio');
    const play = document.querySelector('#play');
    const seek = document.querySelector('#seek');
    const current = document.querySelector('#current');
    const duration = document.querySelector('#duration');
    const format = (seconds) => Number.isFinite(seconds) ? `${Math.floor(seconds / 60)}:${String(Math.floor(seconds % 60)).padStart(2, '0')}` : '0:00';
    audio.addEventListener('loadedmetadata', () => { duration.textContent = format(audio.duration); });
    audio.addEventListener('timeupdate', () => { current.textContent = format(audio.currentTime); seek.value = (audio.currentTime / (audio.duration || 1)) * 1000; });
    audio.addEventListener('play', () => { play.textContent = 'Ⅱ'; play.setAttribute('aria-label', 'Pause'); });
    audio.addEventListener('pause', () => { play.textContent = '▶'; play.setAttribute('aria-label', 'Play'); });
    audio.addEventListener('ended', () => { play.textContent = '▶'; });
    play.addEventListener('click', () => { audio.paused ? audio.play() : audio.pause(); });
    seek.addEventListener('input', () => { audio.currentTime = (seek.value / 1000) * (audio.duration || 0); });
    document.querySelector('#back').addEventListener('click', () => { audio.currentTime = Math.max(0, audio.currentTime - 10); });
    document.querySelector('#forward').addEventListener('click', () => { audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10); });
    document.querySelector('#volume').addEventListener('input', (event) => { audio.volume = event.target.value; });
  </script>
</body>
</html>
